name: 自动同步上游仓库
on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动同步一次
  workflow_dispatch:       # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置上游地址
        run: git remote add upstream https://github.com/qq148376839/tvbox-source-aggregator.git

      - name: 拉取上游更新
        run: git fetch upstream

      - name: 合并并推送到自己仓库
        run: |
          git merge upstream/main --no-edit
          git push origin main
